services:
  db:
    image: postgres:16
    container_name: primo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: primo
      POSTGRES_PASSWORD: primo
      POSTGRES_DB: primo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primo -d primo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: primo-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
